name: Build and Publish IDM Activator Release

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Version Name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest  # Go builds for Windows
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows Executable
        run: |
          go build -ldflags="-s -w" -o IDM-Activator.exe main.go

      - name: Extract Version and Changelog
        id: extract
        run: |
          $VERSION_TAG = "v${{ github.event.inputs.versionName }}"
          $LAST_TAG = git describe --tags --abbrev=0 2>$null
          if ($LAST_TAG) {
            $CHANGELOG = git log ${LAST_TAG}..HEAD --pretty=format:"- %s"
          } else {
            $CHANGELOG = git log -1 --pretty=format:"- %s"
          }
          if (-not $CHANGELOG) {
            $CHANGELOG = git log -1 --pretty=format:"- %s"
          }
          echo "version_tag=$VERSION_TAG" >> $env:GITHUB_ENV
          echo "changelog<<EOF" >> $env:GITHUB_ENV
          echo $CHANGELOG >> $env:GITHUB_ENV
          echo "EOF" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.version_tag }}
          name: Release ${{ env.version_tag }}
          body: ${{ env.changelog }}
          files: |
            IDM-Activator.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Files to Telegram Group
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '-1003782580194'
          RELEASE_URL: 'https://github.com/myst-25/idm-activator/releases/tag/${{ env.version_tag }}'
          REPO_URL: 'https://github.com/myst-25/idm-activator'
        run: |
          $CAPTION = @"
          <b>New IDM Activator Release: ${{ env.version_tag }}</b>

          A Go-based wrapper for IDM activation.
          Run as Administrator for best results.

          <b>Changelog:</b>
          ${{ env.changelog }}

          🔗 <a href="$env:RELEASE_URL">Download / View Release</a>
          📦 <a href="$env:REPO_URL">GitHub Repository</a>
          "@

          $MEDIA_JSON = @'
          [
            {
              "type": "document",
              "media": "attach://activator_file",
              "caption": $CAPTION,
              "parse_mode": "HTML"
            }
          ]
          '@

          curl.exe -X POST "https://api.telegram.org/bot${env:TELEGRAM_BOT_TOKEN}/sendMediaGroup" `
            -F chat_id="${env:TELEGRAM_CHAT_ID}" `
            -F media="$MEDIA_JSON" `
            -F activator_file="@IDM-Activator.exe"
        shell: pwsh